name: Release APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to attach release assets to"
        required: true
        default: "v2026-07-04-moses"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      # 始终从 main 构建（旧 tag 可能不含 CI 修复）；Release 仍挂到指定 tag
      - uses: actions/checkout@v7
        with:
          ref: main

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      # 预装 Android cmdline-tools / sdkmanager（避免 Gradle 构建时在线拉 CMake 偶发 zip 损坏）
      - uses: android-actions/setup-android@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install CMake (retry corrupted SDK downloads)
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          pkg="cmake;3.22.1"
          for attempt in 1 2 3 4 5; do
            rm -rf "${ANDROID_HOME}/.temp" "${ANDROID_HOME}/cmake/3.22.1" 2>/dev/null || true
            if sdkmanager --install "$pkg"; then
              echo "Installed $pkg on attempt $attempt"
              exit 0
            fi
            echo "sdkmanager attempt $attempt failed; retrying in 20s..."
            sleep 20
          done
          echo "::error::Failed to install $pkg after 5 attempts"
          exit 1

      - name: Configure production API
        run: |
          if [ -z "${{ secrets.API_BASE }}" ]; then
            echo "::error::Set repository secret API_BASE (e.g. https://im.example.com)"
            exit 1
          fi
          echo "{\"API_BASE\":\"${{ secrets.API_BASE }}\"}" > config/prod.json

      - name: Configure release signing
        working-directory: mobile
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "ANDROID_KEYSTORE_BASE64 not set; using default Gradle signing"
            exit 0
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/ihope-release.jks
          cat > android/key.properties <<EOF
          storePassword=${ANDROID_KEYSTORE_PASSWORD}
          keyPassword=${ANDROID_KEY_PASSWORD}
          keyAlias=${ANDROID_KEY_ALIAS}
          storeFile=app/ihope-release.jks
          EOF

      - name: Build domestic release APK
        env:
          CI: "true"
          ORG_GRADLE_PROJECT_useCnMavenMirror: "false"
          ORG_GRADLE_PROJECT_android.newDsl: "false"
          ORG_GRADLE_PROJECT_android.builtInKotlin: "false"
        run: |
          flutter pub get
          flutter build apk --release --flavor domestic \
            --dart-define-from-file=config/prod.json \
            --dart-define-from-file=config/domestic.json

      - name: Verify APK artifact
        run: |
          ls -lh build/app/outputs/flutter-apk/
          test -f build/app/outputs/flutter-apk/app-domestic-release.apk

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          files: mobile/build/app/outputs/flutter-apk/app-domestic-release.apk
          generate_release_notes: true
          fail_on_unmatched_files: true
          make_latest: true
