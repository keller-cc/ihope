name: Release APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to attach release assets to"
        required: true
        default: "v2026-07-04-0.1.0"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      # 始终从 main 构建（旧 tag 可能不含 CI 修复）；Release 仍挂到指定 tag
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Configure production API
        run: |
          if [ -z "${{ secrets.API_BASE }}" ]; then
            echo "::error::Set repository secret API_BASE (e.g. https://im.example.com)"
            exit 1
          fi
          echo "{\"API_BASE\":\"${{ secrets.API_BASE }}\"}" > config/prod.json

      - name: Build domestic release APK
        env:
          CI: "true"
          ORG_GRADLE_PROJECT_useCnMavenMirror: "false"
        run: |
          flutter pub get
          flutter build apk --release --flavor domestic \
            --dart-define-from-file=config/prod.json \
            --dart-define-from-file=config/domestic.json

      - name: Verify APK artifact
        run: |
          ls -lh build/app/outputs/flutter-apk/
          test -f build/app/outputs/flutter-apk/app-domestic-release.apk

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          files: mobile/build/app/outputs/flutter-apk/app-domestic-release.apk
          generate_release_notes: true
          fail_on_unmatched_files: true
          make_latest: true
