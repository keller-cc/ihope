<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>IHope 管理后台</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <header>
      <h1>IHope 管理后台</h1>
      <p class="subtitle">CLPRINCE · 开发者运维 · 不含消息明文</p>
    </header>

    <section id="login-panel" class="card">
      <h2>开发者验证</h2>
      <p class="hint">在服务器 <code>deploy/.env</code> 配置 <code>ADMIN_SECRET</code>，在此输入同一密钥。与 App 用户账号无关。</p>
      <label>服务器地址<input id="api-base" type="url" placeholder="http://localhost:8080" /></label>
      <label>管理密钥<input id="admin-secret" type="password" autocomplete="off" /></label>
      <button id="login-btn" type="button">进入</button>
      <p id="login-error" class="error hidden"></p>
    </section>

    <section id="dashboard" class="hidden">
      <div class="toolbar">
        <div id="stats" class="stats"></div>
        <div class="toolbar-actions">
          <button id="refresh-all-btn" type="button" class="secondary">刷新</button>
          <button id="logout-btn" type="button" class="secondary">退出</button>
        </div>
      </div>

      <div id="service-panel" class="card service-panel"></div>

      <div class="card">
        <h2 class="section-title">用户列表</h2>

        <div class="filter-bar">
          <div class="search-row">
            <input id="search-input" type="search" placeholder="搜索用户名或邮箱…" />
            <button id="search-btn" type="button">搜索</button>
            <button id="clear-search-btn" type="button" class="secondary">清除</button>
          </div>
          <div class="pager">
            <button id="prev-page" type="button" class="secondary">上一页</button>
            <span id="page-info"></span>
            <button id="next-page" type="button" class="secondary">下一页</button>
          </div>
        </div>

        <p id="list-meta" class="hint"></p>
        <table>
          <thead id="users-thead">
            <tr></tr>
          </thead>
          <tbody id="users-body"></tbody>
        </table>
        <p id="list-error" class="error hidden"></p>
      </div>
    </section>

    <dialog id="user-dialog">
      <div class="dialog-inner">
        <div class="dialog-header">
          <h2 id="detail-title">用户详情</h2>
          <div class="dialog-actions">
            <button id="refresh-detail-btn" type="button" class="secondary">刷新</button>
            <button id="close-detail" type="button" class="secondary icon-btn" aria-label="关闭">×</button>
          </div>
        </div>
        <div id="detail-body"></div>
      </div>
    </dialog>
  </div>
  <script src="app.js"></script>
</body>
</html>
