<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>IHope 管理后台</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <header>
      <h1>IHope 管理后台</h1>
      <p class="subtitle">CLPRINCE · 不含消息明文，仅账号运维</p>
    </header>

    <section id="login-panel" class="card">
      <h2>管理员登录</h2>
      <p class="hint">使用已在 <code>ADMIN_EMAILS</code> 中配置的邮箱账号登录。</p>
      <label>服务器地址<input id="api-base" type="url" placeholder="http://localhost:8080" /></label>
      <label>邮箱<input id="email" type="email" autocomplete="username" /></label>
      <label>密码<input id="password" type="password" autocomplete="current-password" /></label>
      <button id="login-btn" type="button">登录</button>
      <p id="login-error" class="error hidden"></p>
    </section>

    <section id="dashboard" class="hidden">
      <div class="toolbar">
        <div id="stats" class="stats"></div>
        <button id="logout-btn" type="button" class="secondary">退出</button>
      </div>
      <div class="card">
        <h2>用户列表</h2>
        <table>
          <thead>
            <tr>
              <th>用户名</th>
              <th>邮箱</th>
              <th>注册时间</th>
              <th>状态</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="users-body"></tbody>
        </table>
        <p id="list-error" class="error hidden"></p>
      </div>
    </section>
  </div>
  <script src="app.js"></script>
</body>
</html>
