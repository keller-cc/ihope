name: ihope
description: IHope messenger by CLPRINCE (E2EE chat)
publish_to: "none"
version: 0.1.1+2

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.7.0
  web_socket_channel: ^3.0.1
  flutter_secure_storage: ^10.3.1
  uuid: ^4.5.1
  image_picker: ^1.1.2
  file_picker: ^12.0.0-beta.7
  record: ^7.1.1
  audioplayers: ^6.5.0
  path_provider: ^2.1.5
  sqflite: ^2.4.2
  path: ^1.9.1
  cryptography: ^2.7.0
  connectivity_plus: ^7.2.0
  open_file: ^4.0.0
  image: ^4.5.4
  crop_your_image: ^2.0.0
  gal: ^2.3.2
  libsignal_protocol_dart: ^0.8.2
  intl: ^0.20.2
  firebase_core: ^4.11.0
  firebase_messaging: ^16.4.1
  # jpush_flutter 暂移除：3.4.6 仍含 jcenter()，与 Gradle 8.14+ 不兼容；恢复见 mobile/README.md
  permission_handler: ^12.0.3
  flutter_local_notifications: ^22.0.1
  flutter_foreground_task: ^9.2.2
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.2.0
  url_launcher: ^6.3.2
  # 10.2.0 在 AGP 9 + builtInKotlin=false 时不编译 Kotlin；锁 10.1.0 直至全面迁移 Built-in Kotlin
  package_info_plus: 10.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  sqflite_common_ffi: ^2.3.5

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icon/app_icon.png
  adaptive_icon_background: "#283593"
  adaptive_icon_foreground: assets/icon/app_icon.png

flutter:
  uses-material-design: true
