# =============================================================================
# IHope 本地开发 — Docker Compose
# =============================================================================
# 用途：在 Windows/Mac 上启动本地 PostgreSQL，供后端 go run 连接。
#
# 使用方式（必须在 deploy 目录执行，才会读取同目录的 .env）：
#   cd deploy
#   copy ..\.env.example .env          # 首次
#   docker compose -f docker-compose.dev.yml up -d    # 启动
#   docker compose -f docker-compose.dev.yml down     # 停止
#   docker compose -f docker-compose.dev.yml ps       # 查看状态
#
# 说明：
#   - 本文件仅包含数据库，后端仍在宿主机用 go run 启动（见 docs/Windows开发环境.md）
#   - 生产环境会使用单独的 docker-compose.yml（含 backend、nginx），尚未创建
# =============================================================================

services:
  postgres:
    # 官方 PostgreSQL 16 轻量镜像
    image: postgres:16-alpine

    # 容器名称，便于 docker ps / docker logs 查找
    container_name: ihope-postgres-dev

    environment:
      # 数据库超级用户/业务用户（与 .env 中 POSTGRES_USER 对应）
      POSTGRES_USER: ${POSTGRES_USER:-ihope}
      # 数据库密码（读取 .env 的 DB_PASSWORD；首次建库时生效）
      POSTGRES_PASSWORD: ${DB_PASSWORD:-devpassword}
      # 默认创建的数据库名（与 .env 中 POSTGRES_DB 对应）
      POSTGRES_DB: ${POSTGRES_DB:-ihope}

    ports:
      # 宿主机端口:容器内端口
      # 左侧 ${DB_PORT} 来自 deploy/.env，Navicat 连宿主机 IP + 该端口
      # 若本机 5432 已被其他 PostgreSQL 占用，可在 .env 改为 5433 等
      - "${DB_PORT:-5432}:5432"

    volumes:
      # 数据持久化到 deploy/data/postgres（已在 .gitignore，勿提交）
      # 删除该目录 = 清空本地库，下次 up 会按 .env 密码重新初始化
      - ./data/postgres:/var/lib/postgresql/data

    healthcheck:
      # 容器就绪检测：用户 ihope 能否连接
      test: ["CMD-SHELL", "pg_isready -U ihope"]
      interval: 5s
      timeout: 5s
      retries: 5

    # Docker Desktop 重启后自动拉起数据库
    restart: unless-stopped
