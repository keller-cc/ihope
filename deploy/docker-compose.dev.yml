# Windows 开发：在项目根目录执行
#   docker compose -f deploy/docker-compose.dev.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: ihope-postgres-dev
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ihope}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-devpassword}
      POSTGRES_DB: ${POSTGRES_DB:-ihope}
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ihope"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
