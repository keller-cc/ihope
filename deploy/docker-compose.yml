# =============================================================================
# IHope 生产部署 — PostgreSQL + 后端 + Nginx
# =============================================================================
# 用法（在 deploy 目录）：
#   cp ..\.env.example .env    # 首次；填 DB_PASSWORD、JWT_SECRET、APP_PUBLIC_URL 等
#   docker compose up -d --build
#   curl http://localhost/api/health
#
# 生产请将 APP_PUBLIC_URL 设为 https://你的域名，并用 certbot 配置 HTTPS。
# =============================================================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: ihope-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ihope}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-ihope}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ihope} -d ${POSTGRES_DB:-ihope}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks: [ihope_net]

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: ihope-backend
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      SERVER_PORT: "8080"
      UPLOAD_DIR: /data/uploads
      ADMIN_WEB_DIR: /app/admin
    volumes:
      - uploads_data:/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks: [ihope_net]

  nginx:
    image: nginx:1.27-alpine
    container_name: ihope-nginx
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped
    networks: [ihope_net]

volumes:
  postgres_data:
  uploads_data:

networks:
  ihope_net:
