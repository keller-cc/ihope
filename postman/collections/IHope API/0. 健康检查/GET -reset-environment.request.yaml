$kind: http-request
name: Reset environment variables
url: "{{baseUrl}}/api/health"
method: GET
scripts:
  - type: beforeRequest
    language: text/javascript
    code: |-
      const envName = pm.environment.name;

      const common = {
        baseUrl: 'http://localhost:8080',
        ws_base_url: 'ws://localhost:8080',
        access_token: '',
        refresh_token: '',
        old_access_token: '',
        old_refresh_token: '',
        reset_token: '',
        login_password: 'password123',
        peer_user_id: '',
        conversation_id: '',
        member_user_id: '',
        my_user_id: '',
        group_epoch: '',
        message_before_epoch: '',
        message_after_epoch: '',
      };

      const profiles = {
        'IHope Local': {
          device_id: 'postman-device-1',
          login_email: 'alice@example.com',
          login_username: 'alice',
          identity_public_key: 'AAECAwQFBgcICQoLDA0ODxAREhMUFRYXGBkaGxwdHh8=',
        },
        'IHope Alice': {
          device_id: 'postman-alice',
          login_email: 'alice@example.com',
          login_username: 'alice',
          identity_public_key: 'AAECAwQFBgcICQoLDA0ODxAREhMUFRYXGBkaGxwdHh8=',
        },
        'IHope Bob': {
          device_id: 'postman-bob',
          login_email: 'bob@example.com',
          login_username: 'bob',
          identity_public_key: 'ICEiIyQlJicoKSorLC0uLzAxMjM0NTY3ODk6Ozw9Pj8=',
        },
      };

      if (!envName || !profiles[envName]) {
        throw new Error('请先选择 IHope Local / IHope Alice / IHope Bob 环境');
      }

      const defaults = { ...common, ...profiles[envName] };
      Object.entries(defaults).forEach(([key, value]) => pm.environment.set(key, value));
  - type: afterResponse
    language: text/javascript
    code: |-
      const envName = pm.environment.name;
      const expectedKeys = {
        'IHope Local': 'AAECAwQFBgcICQoLDA0ODxAREhMUFRYXGBkaGxwdHh8=',
        'IHope Alice': 'AAECAwQFBgcICQoLDA0ODxAREhMUFRYXGBkaGxwdHh8=',
        'IHope Bob': 'ICEiIyQlJicoKSorLC0uLzAxMjM0NTY3ODk6Ozw9Pj8=',
      };

      pm.test('environment reset to defaults', function () {
        pm.expect(pm.environment.get('login_password')).to.eql('password123');
        pm.expect(pm.environment.get('access_token')).to.eql('');
        pm.expect(pm.environment.get('refresh_token')).to.eql('');
        pm.expect(pm.environment.get('peer_user_id')).to.eql('');
        pm.expect(pm.environment.get('conversation_id')).to.eql('');
        pm.expect(pm.environment.get('member_user_id')).to.eql('');
        pm.expect(pm.environment.get('my_user_id')).to.eql('');
        pm.expect(pm.environment.get('group_epoch')).to.eql('');
        pm.expect(pm.environment.get('message_before_epoch')).to.eql('');
        pm.expect(pm.environment.get('message_after_epoch')).to.eql('');
        pm.expect(pm.environment.get('baseUrl')).to.eql('http://localhost:8080');
        pm.expect(pm.environment.get('ws_base_url')).to.eql('ws://localhost:8080');
        if (expectedKeys[envName]) {
          pm.expect(pm.environment.get('identity_public_key')).to.eql(expectedKeys[envName]);
        }
      });
      pm.test('server reachable after reset', function () {
        pm.response.to.have.status(200);
      });
order: 500
