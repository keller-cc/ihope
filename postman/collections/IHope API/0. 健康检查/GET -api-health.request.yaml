$kind: http-request
name: GET /api/health
url: "{{baseUrl}}/api/health"
method: GET
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('health check ok', function () {
        pm.response.to.have.status(200);
        pm.expect(pm.response.json().ok).to.eql(true);
      });
order: 1000
