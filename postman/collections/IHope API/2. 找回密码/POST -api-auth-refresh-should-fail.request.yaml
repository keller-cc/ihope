$kind: http-request
name: POST /api/auth/refresh (should fail after reset)
url: "{{baseUrl}}/api/auth/refresh"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "refresh_token": "{{old_refresh_token}}",
      "device_id": "{{device_id}}"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('old refresh token invalidated', function () {
        pm.response.to.have.status(401);
        pm.expect(pm.response.json().error).to.eql('invalid_refresh');
      });
order: 5000
