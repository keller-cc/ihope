$kind: http-request
name: POST /api/auth/forgot-password
url: "{{baseUrl}}/api/auth/forgot-password"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "email": "alice@example.com"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      if (pm.response.code === 200 && pm.environment.name) {
        const at = pm.environment.get('access_token');
        if (at) pm.environment.set('old_access_token', at);
        const rt = pm.environment.get('refresh_token');
        if (rt) pm.environment.set('old_refresh_token', rt);
        const json = pm.response.json();
        if (json.dev_reset_token) pm.environment.set('reset_token', json.dev_reset_token);
      }
order: 1000
