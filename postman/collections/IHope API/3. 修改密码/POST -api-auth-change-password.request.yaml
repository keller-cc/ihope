$kind: http-request
name: POST /api/auth/change-password
url: "{{baseUrl}}/api/auth/change-password"
method: POST
headers:
  Content-Type: application/json
  Authorization: Bearer {{access_token}}
body:
  type: json
  content: |-
    {
      "current_password": "{{login_password}}",
      "new_password": "newpassword123"
    }
scripts:
  - type: beforeRequest
    language: text/javascript
    code: |-
      if (pm.environment.name) {
        const at = pm.environment.get('access_token');
        if (at) pm.environment.set('old_access_token', at);
        const rt = pm.environment.get('refresh_token');
        if (rt) pm.environment.set('old_refresh_token', rt);
      }
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('password changed', function () {
        pm.response.to.have.status(200);
      });
      if (pm.response.code === 200 && pm.environment.name) {
        pm.environment.set('login_password', 'newpassword123');
        pm.environment.set('access_token', '');
        pm.environment.set('refresh_token', '');
      }
order: 1000
