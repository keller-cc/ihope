$kind: http-request
name: GET /api/conversations/{id}/messages
url: "{{baseUrl}}/api/conversations/{{conversation_id}}/messages?limit=50"
method: GET
headers:
  Authorization: Bearer {{access_token}}
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('messages listed', function () {
        pm.response.to.have.status(200);
        const json = pm.response.json();
        pm.expect(json.messages).to.be.an('array').that.is.not.empty;
      });
order: 4000
